<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Nubank </title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="/asset/img/image.png">
</head>

<body>
    <video autoplay muted loop id="bg-video">
        <source
            src="img/Abstract White Background 4K - Motion Graphics Background Loop - White Video Loop - Free Stock Footage 4K (1440p, av1, youtube).mp4"
            type="video/mp4">
    </video>



    <section class="bloco">
        
             <img class="imglogo" src="/asset/img/image-removebg-preview (2).png" alt="logo">

       
        
        <div class="card">

            <div class=" titulo">
                <h1>Faça o seu login </h1>
                <span class="bolinha"></span>

            </div>
            <form class="form" id="formLogin">
                <div class="email">
                    <P>Email</P>
                    <input id="email" type="Email" placeholder="Email">
                </div>
                <div class="senha">
                    <P>Senha</P>
                    <input id="senha" type="password" placeholder="Senha">
                </div>
                <div class="esqueci">
                    <a href="#">Esqueci a senha </a>

                </div>
                <div class="nlogin">
                    <input class="button " id="entrar" type="submit" value="Enviar">
                    
                    <a href="#">Ainda não tenho conta</a>
                </div>

        </div>
        </form>



        </div>



    </section>
    <div class="mockup">
        <img class="celular" src="/asset/img/cll foto.png" alt="">
        <img class="cartao" src="/asset/img/cartao.png" alt="">
    </div>



    <script src="script.js"></script>

</body>

</html>
